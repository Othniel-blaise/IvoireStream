<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 130" width="620" height="130" role="img" aria-label="IvoireStream Logo — Light">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@900&amp;family=Space+Mono&amp;display=swap');
    </style>

    <linearGradient id="boltGradL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#19E680"/>
      <stop offset="55%"  stop-color="#00C060"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>

    <!-- Wordmark: dark version for light bg -->
    <linearGradient id="wordGradL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0A8A48"/>
      <stop offset="50%"  stop-color="#007A38"/>
      <stop offset="100%" stop-color="#CC6000"/>
    </linearGradient>

    <!-- Icon border gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#19E680"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>

    <filter id="boltGlowL" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ─── Background ─── -->
  <rect width="620" height="130" fill="#F6F8F7"/>

  <!-- ─── Icon Mark: rounded square (ivory bg, gradient border) ─── -->
  <rect x="16" y="20" width="90" height="90" rx="22" fill="#FFFFFF"/>
  <rect x="16" y="20" width="90" height="90" rx="22" fill="none"
        stroke="url(#borderGrad)" stroke-width="2"/>

  <g transform="translate(23, 28) scale(0.74)" filter="url(#boltGlowL)">
    <path d="M 66 4 L 24 52 L 40 52 L 26 96 L 76 48 L 60 48 Z"
          fill="url(#boltGradL)"/>
  </g>

  <!-- ─── Wordmark ─── -->
  <text x="124" y="80"
        font-family="'Syne', 'Arial Black', 'Trebuchet MS', sans-serif"
        font-weight="900"
        font-size="52"
        fill="url(#wordGradL)"
        xml:space="preserve">IvoireStream</text>

  <!-- ─── Tagline ─── -->
  <text x="126" y="104"
        font-family="'Space Mono', 'Courier New', monospace"
        font-size="9.5"
        fill="#5A6A62"
        letter-spacing="3.5">STREAM · IVOIRIEN · LIVE</text>
</svg>
