<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 130" width="620" height="130" role="img" aria-label="IvoireStream Logo">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@900&amp;family=Space+Mono&amp;display=swap');
    </style>

    <!-- Bolt gradient: vert → orange (CI flag reversed) -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#19E680"/>
      <stop offset="55%"  stop-color="#00C060"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>

    <!-- Wordmark gradient: horizontal -->
    <linearGradient id="wordGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#19E680"/>
      <stop offset="50%"  stop-color="#00C060"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>

    <!-- Subtle BG glow left -->
    <radialGradient id="bgGlow" cx="12%" cy="50%" r="28%">
      <stop offset="0%"   stop-color="#19E680" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#19E680" stop-opacity="0"/>
    </radialGradient>

    <!-- Bolt soft glow filter -->
    <filter id="boltGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ─── Background ─── -->
  <rect width="620" height="130" fill="#0F0F14"/>
  <rect width="620" height="130" fill="url(#bgGlow)"/>

  <!-- ─── Icon Mark: rounded square ─── -->
  <rect x="16" y="20" width="90" height="90" rx="22" fill="#0A120E"/>
  <rect x="16" y="20" width="90" height="90" rx="22" fill="none"
        stroke="#19E680" stroke-width="1.2" opacity="0.28"/>

  <!--
    Bolt path in 100×100 normalized space:
    M 66 4  L 24 52  L 40 52  L 26 96  L 76 48  L 60 48  Z
    → scale(0.74) → translate(23, 28) to center in the 90×90 icon
  -->
  <g transform="translate(23, 28) scale(0.74)" filter="url(#boltGlow)">
    <path d="M 66 4 L 24 52 L 40 52 L 26 96 L 76 48 L 60 48 Z"
          fill="url(#boltGrad)"/>
  </g>

  <!-- ─── Wordmark ─── -->
  <text x="124" y="80"
        font-family="'Syne', 'Arial Black', 'Trebuchet MS', sans-serif"
        font-weight="900"
        font-size="52"
        fill="url(#wordGrad)"
        xml:space="preserve">IvoireStream</text>

  <!-- ─── Tagline ─── -->
  <text x="126" y="104"
        font-family="'Space Mono', 'Courier New', monospace"
        font-size="9.5"
        fill="#7A8A82"
        letter-spacing="3.5">STREAM · IVOIRIEN · LIVE</text>
</svg>
